<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"/><link rel="stylesheet" href="_preview.css"/></head>
<body><div class="card-root">
  <div class="kicker">Cards</div>
  <div class="row" style="gap:14px; align-items:stretch;">
    <div style="flex:1; padding:18px; border:1px solid var(--line); border-radius:10px; background:var(--panel);">
      <div class="kicker" style="margin-bottom:6px;">TOKEN COST · 14d</div>
      <div class="metric-numeral">$2.34</div>
      <div class="row" style="gap:6px; margin-top:10px;">
        <span class="tag green" style="font-size:10px;">−12%</span>
        <span class="label" style="font-size:11px;">vs prev period</span>
      </div>
    </div>
    <div style="flex:1.4; padding:18px; border:1px solid var(--line); border-radius:14px; background:radial-gradient(120% 80% at 100% 0%, rgba(56,189,248,.10) 0%, transparent 55%), var(--panel); position:relative; overflow:hidden;">
      <div class="kicker" style="margin-bottom:6px;">COMMAND DECK</div>
      <div style="font-size:24px; font-weight:650; letter-spacing:-.035em; color:#fff; line-height:1.12; margin-bottom:8px;">Hermes 控制台</div>
      <div style="font-size:13px; color:var(--muted); line-height:1.55;">多会话工作台。Profiles、Runs、Tools 与安全终端集中在一处。</div>
    </div>
  </div>
  <div class="label">Card · 1px hairline · 10px radius · solid panel · no shadow. Hero · 14px radius · radial accent glow top-right · the only "design moment".</div>
</div></body></html>
