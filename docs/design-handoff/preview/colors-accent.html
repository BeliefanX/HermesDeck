<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"/><link rel="stylesheet" href="_preview.css"/></head>
<body><div class="card-root">
  <div class="kicker">Accent · sky</div>
  <div class="row" style="gap:8px;">
    <div class="swatch" style="flex:1; background:#38bdf8; border:none;"><div class="name" style="color:#08090c">--accent</div><div class="hex" style="color:#08090c">#38bdf8</div></div>
    <div class="swatch" style="flex:1; background:#0ea5e9; border:none;"><div class="name" style="color:#fff">--accent-2</div><div class="hex" style="color:rgba(255,255,255,.7)">#0ea5e9</div></div>
    <div class="swatch" style="flex:1; background:rgba(56,189,248,.20); border:1px solid rgba(56,189,248,.34);"><div class="name">--accent-strong</div><div class="hex">rgba .20</div></div>
    <div class="swatch" style="flex:1; background:rgba(56,189,248,.12); border:1px solid rgba(56,189,248,.34);"><div class="name">--accent-soft</div><div class="hex">rgba .12</div></div>
  </div>
  <div class="row" style="gap:8px; align-items:center;">
    <div style="height:32px; width:120px; border-radius:8px; background:var(--grad-brand);"></div>
    <div class="label">--grad-brand · 140deg #7dd3fc → #0ea5e9 · brand mark only</div>
  </div>
  <div class="row-wrap">
    <span class="tag accent">active</span>
    <span class="tag accent">running</span>
    <span class="label">Used at most a few times per screen.</span>
  </div>
</div></body></html>
