<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"/><link rel="stylesheet" href="_preview.css"/></head>
<body><div class="card-root">
  <div class="kicker">Elevation</div>
  <div class="row" style="gap:16px;">
    <div class="col" style="align-items:flex-start; gap:8px; flex:1;">
      <div style="width:100%; height:60px; background:var(--panel); border:1px solid var(--line); border-radius:10px; box-shadow:none;"></div>
      <div class="label label-strong">--shadow-card</div>
      <div class="label">none — flat by design</div>
    </div>
    <div class="col" style="align-items:flex-start; gap:8px; flex:1;">
      <div style="width:100%; height:60px; background:var(--panel); border:1px solid var(--line); border-radius:10px; box-shadow:0 16px 40px rgba(0,0,0,.42), 0 1px 0 rgba(255,255,255,.06) inset;"></div>
      <div class="label label-strong">--shadow-pop</div>
      <div class="label">popovers, sheets, toasts</div>
    </div>
    <div class="col" style="align-items:flex-start; gap:8px; flex:1;">
      <div style="width:100%; height:60px; background:var(--panel); border:1px solid var(--line); border-radius:10px; box-shadow:0 0 0 2px rgba(56,189,248,.55);"></div>
      <div class="label label-strong">--ring</div>
      <div class="label">2px accent · focus only</div>
    </div>
  </div>
</div></body></html>
