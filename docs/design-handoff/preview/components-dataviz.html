<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"/><link rel="stylesheet" href="_preview.css"/></head>
<body><div class="card-root">
  <div class="kicker">Data viz · pure CSS</div>
  <div class="row" style="gap:14px; align-items:stretch;">
    <div style="flex:1; padding:14px; border:1px solid var(--line); border-radius:10px; background:var(--panel);">
      <div class="kicker" style="margin-bottom:8px;">RUNS · 14d</div>
      <div style="display:flex; align-items:flex-end; gap:3px; height:48px;">
        <div style="flex:1; height:30%; background:rgba(56,189,248,.65); border-radius:2px;"></div>
        <div style="flex:1; height:48%; background:rgba(56,189,248,.65); border-radius:2px;"></div>
        <div style="flex:1; height:24%; background:rgba(56,189,248,.65); border-radius:2px;"></div>
        <div style="flex:1; height:62%; background:rgba(56,189,248,.65); border-radius:2px;"></div>
        <div style="flex:1; height:38%; background:rgba(56,189,248,.65); border-radius:2px;"></div>
        <div style="flex:1; height:80%; background:rgba(56,189,248,.65); border-radius:2px;"></div>
        <div style="flex:1; height:55%; background:rgba(56,189,248,.65); border-radius:2px;"></div>
        <div style="flex:1; height:90%; background:rgba(56,189,248,.65); border-radius:2px;"></div>
        <div style="flex:1; height:42%; background:rgba(56,189,248,.65); border-radius:2px;"></div>
        <div style="flex:1; height:100%; background:#38bdf8; border-radius:2px;"></div>
      </div>
    </div>
    <div style="flex:1.2; padding:14px; border:1px solid var(--line); border-radius:10px; background:var(--panel);">
      <div class="kicker" style="margin-bottom:10px;">TOP MODELS · 14d</div>
      <div class="col" style="gap:8px;">
        <div style="display:grid; grid-template-columns:90px 1fr 50px; gap:10px; align-items:center;"><span style="font-size:12px; color:var(--text);">claude-haiku</span><div style="height:6px; background:var(--surface-bg); border-radius:3px; overflow:hidden;"><div style="height:100%; width:88%; background:var(--accent); border-radius:3px;"></div></div><span class="mono" style="font-size:11px; color:var(--value-text); text-align:right;">412</span></div>
        <div style="display:grid; grid-template-columns:90px 1fr 50px; gap:10px; align-items:center;"><span style="font-size:12px; color:var(--text);">gpt-4o</span><div style="height:6px; background:var(--surface-bg); border-radius:3px; overflow:hidden;"><div style="height:100%; width:54%; background:var(--accent); border-radius:3px;"></div></div><span class="mono" style="font-size:11px; color:var(--value-text); text-align:right;">253</span></div>
        <div style="display:grid; grid-template-columns:90px 1fr 50px; gap:10px; align-items:center;"><span style="font-size:12px; color:var(--text);">deepseek-v3</span><div style="height:6px; background:var(--surface-bg); border-radius:3px; overflow:hidden;"><div style="height:100%; width:32%; background:var(--accent); border-radius:3px;"></div></div><span class="mono" style="font-size:11px; color:var(--value-text); text-align:right;">147</span></div>
      </div>
    </div>
  </div>
  <div class="label">Sparkline = flex of bars w/ computed % heights. Bar list = 3-col grid [label][6px rail][value]. Charts inherit accent at 65% opacity; peak bar full opacity.</div>
</div></body></html>
