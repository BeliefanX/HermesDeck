<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"/><link rel="stylesheet" href="_preview.css"/></head>
<body><div class="card-root">
  <div class="kicker">Spacing</div>
  <div class="row" style="gap:14px;">
    <div style="flex:1; border:1px dashed var(--line-strong); border-radius:10px; padding:18px; background:rgba(56,189,248,.04); position:relative;">
      <div style="background:var(--panel); border:1px solid var(--line); border-radius:8px; height:54px;"></div>
      <div class="label" style="position:absolute; top:4px; left:8px; color:var(--accent);">18px · card padding</div>
    </div>
    <div style="flex:1; padding:0; border:1px dashed var(--line-strong); border-radius:10px;">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:8px;">
        <div style="background:var(--panel); border:1px solid var(--line); border-radius:8px; height:36px;"></div>
        <div style="background:var(--panel); border:1px solid var(--line); border-radius:8px; height:36px;"></div>
        <div style="background:var(--panel); border:1px solid var(--line); border-radius:8px; height:36px;"></div>
        <div style="background:var(--panel); border:1px solid var(--line); border-radius:8px; height:36px;"></div>
      </div>
      <div class="label" style="padding:0 10px 8px; color:var(--accent);">14px · grid gap</div>
    </div>
  </div>
  <div class="row" style="gap:18px;">
    <div class="col" style="gap:2px;"><div class="label label-strong">36px</div><div class="label">btn min-height (desktop)</div></div>
    <div class="col" style="gap:2px;"><div class="label label-strong">44px</div><div class="label">touch target (mobile)</div></div>
    <div class="col" style="gap:2px;"><div class="label label-strong">52px</div><div class="label">mobile app bar</div></div>
    <div class="col" style="gap:2px;"><div class="label label-strong">64px</div><div class="label">mobile bottom nav</div></div>
    <div class="col" style="gap:2px;"><div class="label label-strong">248px</div><div class="label">sidebar width</div></div>
  </div>
</div></body></html>
