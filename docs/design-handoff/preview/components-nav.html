<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"/><link rel="stylesheet" href="_preview.css"/></head>
<body><div class="card-root">
  <div class="kicker">Sidebar nav rows</div>
  <div style="background:var(--bg); border:1px solid var(--line); border-radius:10px; padding:8px; width:100%; max-width:520px;">
    <div style="display:flex; align-items:center; gap:10px; height:34px; padding:0 10px; border-radius:8px; color:var(--nav-text); font-size:13px; cursor:pointer;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span>控制中心</span><span style="margin-left:auto; font-size:10.5px; color:var(--muted-2);">Home</span>
    </div>
    <div style="display:flex; align-items:center; gap:10px; height:34px; padding:0 10px; border-radius:8px; background:var(--glass); color:var(--strong-text); font-size:13px; cursor:pointer;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>对话</span><span style="margin-left:auto; font-size:10.5px; color:var(--muted-2);">Chat</span>
    </div>
    <div style="display:flex; align-items:center; gap:10px; height:34px; padding:0 8px 0 10px; border-radius:8px; background:rgba(56,189,248,.12); border-left:2px solid rgba(56,189,248,.55); color:var(--strong-text); font-weight:550; font-size:13px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><path d="M8 16h.01M16 16h.01"/></svg>
      <span>Profiles</span><span style="margin-left:auto; font-size:10.5px; color:var(--accent);">3</span>
    </div>
  </div>
  <div class="label">Default · transparent. Hover · --glass (4% white). Active · accent-soft fill + 2px accent left bar (NOT a chip, NOT a fill — a hairline accent).</div>
</div></body></html>
