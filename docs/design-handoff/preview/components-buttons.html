<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"/><link rel="stylesheet" href="_preview.css"/></head>
<body><div class="card-root">
  <div class="kicker">Buttons</div>
  <div class="row-wrap">
    <button style="display:inline-flex; align-items:center; gap:6px; height:36px; padding:0 14px; border-radius:8px; border:1px solid var(--accent-border); background:var(--accent); color:#08090c; font-family:var(--font-sans); font-size:13px; font-weight:600; cursor:pointer;">运行 Run</button>
    <button style="display:inline-flex; align-items:center; gap:6px; height:36px; padding:0 14px; border-radius:8px; border:1px solid var(--line); background:var(--panel-2); color:var(--text); font-family:var(--font-sans); font-size:13px; font-weight:500; cursor:pointer;">默认 Default</button>
    <button style="display:inline-flex; align-items:center; gap:6px; height:36px; padding:0 14px; border-radius:8px; border:1px solid transparent; background:transparent; color:var(--muted); font-family:var(--font-sans); font-size:13px; font-weight:500; cursor:pointer;">Ghost</button>
    <button style="display:inline-flex; align-items:center; gap:6px; height:36px; padding:0 14px; border-radius:8px; border:1px solid rgba(239,68,68,.40); background:rgba(239,68,68,.10); color:var(--red); font-family:var(--font-sans); font-size:13px; font-weight:500; cursor:pointer;">Danger</button>
    <button style="display:inline-flex; align-items:center; justify-content:center; width:32px; height:32px; border-radius:8px; border:1px solid var(--line); background:var(--panel-2); color:var(--text); cursor:pointer;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></button>
  </div>
  <div class="label">36px height · 8px radius · 14px h-padding · 13px label · weight 500 (primary 600). Press: translateY(.5px) + brightness(.96).</div>
</div></body></html>
