<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"/><link rel="stylesheet" href="_preview.css"/></head>
<body><div class="card-root">
  <div class="kicker">Inputs</div>
  <div class="col" style="gap:10px;">
    <div style="display:flex; align-items:center; gap:8px; height:36px; padding:0 12px; background:var(--bg-soft); border:1px solid var(--line); border-radius:8px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#5c5e6a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <span style="font-size:13px; color:var(--muted);">搜索会话或工具…</span>
    </div>
    <div style="display:flex; align-items:center; gap:8px; height:36px; padding:0 12px; background:var(--bg-soft); border:1px solid var(--line); border-radius:8px; box-shadow:0 0 0 2px rgba(56,189,248,.55);">
      <span style="font-family:var(--font-mono); font-size:13px; color:var(--accent);">/run</span>
      <span style="font-size:13px; color:var(--text);"> deploy --env=staging</span>
    </div>
    <div style="display:flex; align-items:flex-start; gap:8px; min-height:80px; padding:12px; background:var(--bg-soft); border:1px solid var(--line); border-radius:10px;">
      <span style="font-size:13px; color:var(--muted); line-height:1.55;">Ask Hermes anything. Use <span class="kbd" style="font-size:10px;">/</span> for commands, <span class="kbd" style="font-size:10px;">@</span> for tools…</span>
    </div>
  </div>
  <div class="label">36px height · bg-soft fill · 1px hairline border · focus = 2px accent ring (no border swap).</div>
</div></body></html>
