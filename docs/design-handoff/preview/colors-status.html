<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"/><link rel="stylesheet" href="_preview.css"/></head>
<body><div class="card-root">
  <div class="kicker">Status</div>
  <div class="row" style="gap:8px;">
    <div class="swatch" style="flex:1; background:rgba(34,197,94,.12); border:1px solid rgba(34,197,94,.30);"><div class="name" style="color:#22c55e">--green</div><div class="hex">#22c55e · ok / healthy / active</div></div>
    <div class="swatch" style="flex:1; background:rgba(234,179,8,.12); border:1px solid rgba(234,179,8,.30);"><div class="name" style="color:#eab308">--yellow</div><div class="hex">#eab308 · warn / planned</div></div>
    <div class="swatch" style="flex:1; background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.30);"><div class="name" style="color:#ef4444">--red</div><div class="hex">#ef4444 · bad / failed / danger</div></div>
    <div class="swatch" style="flex:1; background:rgba(103,232,249,.10); border:1px solid rgba(103,232,249,.28);"><div class="name" style="color:#67e8f9">--cyan</div><div class="hex">#67e8f9 · source pills</div></div>
  </div>
  <div class="row-wrap">
    <span class="tag green">Healthy</span>
    <span class="tag green">active</span>
    <span class="tag yellow">规划中</span>
    <span class="tag red">failed</span>
    <span class="tag cyan">slack</span>
  </div>
</div></body></html>
