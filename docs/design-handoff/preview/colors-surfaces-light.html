<!doctype html>
<html data-theme="light"><head><meta charset="utf-8"/><link rel="stylesheet" href="_preview.css"/></head>
<body><div class="card-root">
  <div class="kicker">Surfaces · light</div>
  <div class="row" style="gap:0; border:1px solid var(--line); border-radius:10px; overflow:hidden;">
    <div class="swatch on-light" style="flex:1; background:#fafafa; height:auto; padding:14px 12px; border:none;"><div class="name">--bg</div><div class="hex">#fafafa</div></div>
    <div class="swatch on-light" style="flex:1; background:#f4f4f5; height:auto; padding:14px 12px; border:none; border-left:1px solid var(--line);"><div class="name">--bg-soft</div><div class="hex">#f4f4f5</div></div>
    <div class="swatch on-light" style="flex:1; background:#ffffff; height:auto; padding:14px 12px; border:none; border-left:1px solid var(--line);"><div class="name">--panel</div><div class="hex">#ffffff</div></div>
    <div class="swatch on-light" style="flex:1; background:#f7f7f9; height:auto; padding:14px 12px; border:none; border-left:1px solid var(--line);"><div class="name">--panel-2</div><div class="hex">#f7f7f9</div></div>
    <div class="swatch on-light" style="flex:1; background:#ececef; height:auto; padding:14px 12px; border:none; border-left:1px solid var(--line);"><div class="name">--panel-3</div><div class="hex">#ececef</div></div>
  </div>
  <div class="kicker" style="color:var(--muted)">Theme is driven by data-theme on &lt;html&gt;</div>
</div></body></html>
